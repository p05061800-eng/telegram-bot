<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Введите код из Telegram — IlluCards</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1f2e;
      --accent: #6c9cff;
      --accent2: #a78bfa;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --ok: #4ade80;
      --err: #f87171;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #2a1f4a 0%, transparent 55%),
                  radial-gradient(900px 500px at 100% 20%, #0d2840 0%, transparent 50%),
                  var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 420px;
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,.06), transparent);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      box-shadow: 0 24px 48px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 14px 0 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 156, 255, .25);
    }
    .hint {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(108, 156, 255, .08);
      border: 1px solid rgba(108, 156, 255, .2);
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .hint strong { color: var(--text); }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s, opacity .15s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-code {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f1117;
    }
    .btn-in {
      background: rgba(255,255,255,.12);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.15);
    }
    .msg {
      margin-top: 14px;
      min-height: 1.25em;
      font-size: 0.9rem;
    }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Введите код из Telegram</h1>
      <p class="sub"><span aria-hidden="true">🔐</span> Вход через Telegram — введите username и получите код в боте 👇</p>

      <label for="username">Username Telegram (@username)</label>
      <input id="username" type="text" autocomplete="username" placeholder="@username" />

      <label for="code">Код (4 цифры)</label>
      <input id="code" type="text" inputmode="numeric" maxlength="4" placeholder="0000" />

      <div class="hint">
        <strong>Чтобы войти:</strong><br />
        1. Напишите боту <strong>/start</strong><br />
        2. Убедитесь, что в Telegram указан ваш <strong>@username</strong><br />
        3. Нажмите «Получить код» и введите код сюда
      </div>

      <div class="row">
        <button type="button" class="btn-code" id="btnSend">Получить код</button>
        <button type="button" class="btn-in" id="btnVerify">Войти</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script>
    const API = "";
    const msgEl = document.getElementById("msg");
    function setMsg(text, cls) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (cls ? " " + cls : "");
    }
    async function post(path, body) {
      const r = await fetch(API + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      return { ok: r.ok, status: r.status, data };
    }
    document.getElementById("btnSend").onclick = async function () {
      const username = document.getElementById("username").value.trim();
      if (!username) {
        setMsg("Введите @username", "err");
        return;
      }
      setMsg("Отправляем…", "");
      this.disabled = true;
      const { ok, data } = await post("/api/send-code", { username });
      this.disabled = false;
      if (ok && data.success) {
        setMsg("Код отправлен в Telegram ✨", "ok");
      } else {
        setMsg(data.error || "Ошибка", "err");
      }
    };
    document.getElementById("btnVerify").onclick = async function () {
      const username = document.getElementById("username").value.trim();
      const code = document.getElementById("code").value.trim();
      if (!username || !code) {
        setMsg("Введите username и код", "err");
        return;
      }
      setMsg("Проверяем…", "");
      this.disabled = true;
      const { ok, data } = await post("/api/verify-code", { username, code });
      this.disabled = false;
      if (ok && data.success) {
        try {
          localStorage.setItem(
            "illucards_auth",
            JSON.stringify({
              user_id: data.user_id,
              username: data.username,
              at: Date.now(),
            })
          );
        } catch (e) {}
        setMsg("Вход выполнен! Можно закрыть окно или перейти на сайт.", "ok");
      } else {
        setMsg(data.error || "Неверные данные", "err");
      }
    };
  </script>
</body>
</html>
