<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Если страница открыта не с того же хоста, что и API бота, задайте полный URL (без слэша в конце): -->
  <meta name="login-api-base" content="" />
  <!-- Куда перенаправлять после успешного входа -->
  <meta name="post-login-redirect" content="https://illucards.by/catalog" />
  <title>Вход — IlluCards</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-size: 0.85rem; color: #555; }
    input { width: 100%; padding: 0.5rem; box-sizing: border-box; margin-top: 0.25rem; }
    .row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    button { flex: 1; padding: 0.6rem; cursor: pointer; }
    .bot-link { display: inline-block; margin: 0.5rem 0; }
    #msg { margin-top: 1rem; min-height: 1.2em; font-size: 0.9rem; }
    .err { color: #c00; }
    .ok { color: #080; }
  </style>
</head>
<body>
  <h1>Вход через Telegram</h1>
  <p><strong>Быстрый вход без кода:</strong></p>
  <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="__BOT_USERNAME__"
          data-size="large"
          data-userpic="false"
          data-request-access="write"
          data-onauth="onTelegramAuth(user)">
  </script>
  <p id="widgetHint" style="font-size:0.85rem;color:#666;margin-top:.5rem;"></p>
  <hr style="margin:1rem 0;" />
  <p>Сначала откройте бота в Telegram, затем укажите тот же @username.</p>
  <a id="botStartLink" class="bot-link" href="#" target="_blank" rel="noopener">Открыть бота</a>
  <label for="username">@username</label>
  <input id="username" type="text" autocomplete="username" placeholder="@username" />
  <label for="code">Код из Telegram (4 цифры)</label>
  <input id="code" type="text" inputmode="numeric" maxlength="4" placeholder="0000" />
  <div class="row">
    <button type="button" id="btnSend">Получить код</button>
    <button type="button" id="btnVerify">Войти</button>
  </div>
  <div id="msg"></div>
  <script>
    const meta = document.querySelector('meta[name="login-api-base"]');
    const API = ((meta && meta.getAttribute("content")) || "").trim().replace(/\/+$/, "");
    const redirMeta = document.querySelector('meta[name="post-login-redirect"]');
    const REDIRECT_TO = ((redirMeta && redirMeta.getAttribute("content")) || "").trim();
    const msgEl = document.getElementById("msg");
    function setMsg(t, cls) {
      msgEl.textContent = t || "";
      msgEl.className = cls || "";
    }
    async function post(path, body) {
      const url = (API || "") + path;
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(function () { return {}; });
      return { ok: r.ok, data: data };
    }
    function redirectAfterLogin() {
      if (!REDIRECT_TO) return;
      setTimeout(function () {
        window.location.href = REDIRECT_TO;
      }, 700);
    }
    window.onTelegramAuth = async function (user) {
      setMsg("Проверяем вход через Telegram…", "");
      var res = await post("/api/telegram-auth", user || {});
      if (res.ok && res.data.success) {
        try {
          localStorage.setItem("illucards_auth", JSON.stringify({
            user_id: res.data.user_id,
            username: res.data.username,
            first_name: res.data.first_name || "",
            last_name: res.data.last_name || "",
            at: Date.now(),
            method: "telegram_widget"
          }));
        } catch (e) {}
        setMsg("Вход выполнен автоматически через Telegram.", "ok");
        redirectAfterLogin();
      } else {
        setMsg(res.data.error || "Не удалось выполнить вход через Telegram.", "err");
      }
    };
    (function initWidgetHint() {
      var hint = document.getElementById("widgetHint");
      var botLink = document.getElementById("botStartLink");
      var botUsername = ("__BOT_USERNAME__" || "").trim();
      if (botLink && botUsername) {
        botLink.href = "https://t.me/" + encodeURIComponent(botUsername) + "?start=web_login";
      } else if (botLink) {
        botLink.style.display = "none";
      }
      if (!hint) return;
      if (!botUsername) {
        hint.textContent = "Telegram-виджет временно недоступен: не удалось определить username бота.";
      } else {
        hint.textContent = "Нажмите кнопку Telegram выше для входа без кода.";
      }
    })();
    document.getElementById("btnSend").onclick = async function () {
      var u = document.getElementById("username").value.trim();
      if (!u) { setMsg("Введите @username", "err"); return; }
      setMsg("Отправляем…", "");
      this.disabled = true;
      var res = await post("/api/send-code", { username: u });
      this.disabled = false;
      if (res.ok && res.data.success) setMsg("Код отправлен в Telegram.", "ok");
      else setMsg(res.data.error || "Ошибка", "err");
    };
    document.getElementById("btnVerify").onclick = async function () {
      var u = document.getElementById("username").value.trim();
      var c = document.getElementById("code").value.trim();
      if (!u || !c) { setMsg("Введите username и код", "err"); return; }
      setMsg("Проверяем…", "");
      this.disabled = true;
      var res = await post("/api/verify-code", { username: u, code: c });
      this.disabled = false;
      if (res.ok && res.data.success) {
        try {
          localStorage.setItem("illucards_auth", JSON.stringify({
            user_id: res.data.user_id,
            username: res.data.username,
            at: Date.now(),
          }));
        } catch (e) {}
        setMsg("Вход выполнен.", "ok");
        redirectAfterLogin();
      } else setMsg(res.data.error || "Ошибка", "err");
    };
  </script>
</body>
</html>
